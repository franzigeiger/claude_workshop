[tools]
uv = "latest"
lefthook = "latest"
gitleaks = "latest"

[env]
UV_PYTHON = "3.14"

[tasks.setup]
description = "Install deps, set up .env, install git hooks"
run = [
  "uv sync",
  "test -f .env || cp .env.example .env",
  "lefthook install",
]

[tasks.check]
description = "Format check + lint + type check + tests"
run = [
  "uv run ruff format --check .",
  "uv run ruff check .",
  "uv run mypy src tests",
  "uv run deptry src",
  "uv run pytest -q",
]

[tasks.fmt]
description = "Apply formatter"
run = "uv run ruff format ."

[tasks.review]
description = "Run agentic review panel (security, correctness, architecture) over the current diff"
run = "uv run python scripts/review.py"
